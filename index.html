<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVM ડેમો - વોર્ડ 7 ઇડર નગરપાલિકા</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #dcdcdc;
  margin: 0;
  padding: 20px;
}

/* 🔲 MAIN EVM BOX */
.evm-box {
  max-width: 450px;
  margin: auto;
  background: #e6e6e6;
  border: 4px solid #333;
  border-radius: 12px;
  padding: 15px;
  box-shadow: inset 0 0 10px #999;
}

/* 🔖 HEADER */
.header {
  text-align: center;
  font-weight: bold;
  background: #cfcfcf;
  padding: 8px;
  border: 2px solid #333;
  margin-bottom: 10px;
}

/* 📜 STRIP */
.strip {
  background: white;
  border: 2px solid #333;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #ccc;
  height: 60px;
}

.row:last-child {
  border-bottom: none;
}

.no {
  width: 40px;
  text-align: center;
  font-weight: bold;
}

.name {
  flex: 1;
  padding: 0 5px;
  font-size: 14px;
}

.symbol {
  width: 60px;
  text-align: center;
}

.symbol img {
  width: 40px;
  height: 40px;
  object-fit: contain;
}

.light {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #bbb;
  margin: 0 10px;
}

.on {
  background: red;
}

.btn {
  width: 50px;
  height: 30px;
  margin-right: 10px;
  background: #2a7bff;
  border: 1px solid #0b3aa6;
  border-radius: 4px;
  cursor: pointer;
}

.btn:disabled {
  background: #999;
}

/* 🔥 REGISTER BUTTON (RIGHT SIDE & BIGGER) */
.vote-container {
  display: flex;
  justify-content: flex-end;
  margin-top: 10px;
}

.vote-btn {
  width: 120px;
  height: 45px;
  background: gold;
  border: 2px solid #b38f00;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
}

/* 📝 MESSAGE */
.seal {
  margin-top: 12px;
  text-align: center;
  font-size: 13px;
  color: #333;
}

/* RESET */
.reset {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  background: #444;
  color: white;
  border: none;
  cursor: pointer;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="evm-box">

  <div class="header">
    EVM ડેમો - વોર્ડ 7 ઇડર નગરપાલિકા
  </div>

  <div class="strip" id="candidates"></div>

  <!-- 🔥 RIGHT SIDE REGISTER BUTTON -->
  <div class="vote-container">
    <button class="vote-btn" onclick="submitVote()">રજીસ્ટર</button>
  </div>

  <!-- 🔥 GUJARATI MESSAGE -->
  <div class="seal">
    આ માત્ર મતદારોની જાગૃતિ માટે બનાવેલ EVM મશીન ડેમો છે
  </div>

  <button class="reset" onclick="resetMachine()">RESET</button>

</div>

<div class="footer">
  Coded by Fena Anshu Patel
</div>

<script>

const maxVotes = 4;
let selected = [];
let locked = false;

/* 🔥 NOW 9 CANDIDATES */
const data = [
  { no: "૧", name: "આયુષી વિક્રમભાઈ કોઠારી", symbol: "bjp_logo.png" },
  { no: "૨", name: "", symbol: "" },
  { no: "૩", name: "ઉપેન્દ્રભાઈ શીવાભાઈ સુતરીયા", symbol: "bjp_logo.png" },
  { no: "૪", name: "", symbol: "" },
  { no: "૫", name: "", symbol: "" },
  { no: "૬", name: "પાયલબેન મેહુલભાઈ મિસ્ત્રી", symbol: "bjp_logo.png" },
  { no: "૭", name: "પ્રકાશચંદ્ર ડાહ્યાભાઈ પટેલ", symbol: "bjp_logo.png" },
  { no: "૮", name: "", symbol: "" },
  { no: "૯", name: "", symbol: "" },
  { no: "NOTA", name: "નોટા (ઉપરના પૈકી કોઈ નહીં)", symbol: "" }
];

function toggle(index) {
  if (locked) return;

  const notaIndex = data.findIndex(d => d.no === "NOTA");
  const isNota = data[index].no === "NOTA";
  const notaSelected = selected.includes(notaIndex);

  if (notaSelected && !isNota) return;
  if (!notaSelected && isNota && selected.length > 0) return;

  if (selected.includes(index)) {
    selected = selected.filter(i => i !== index);
    render();
    return;
  }

  if (isNota) {
    selected = [index];
    render();
    return;
  }

  if (selected.length >= maxVotes) return;

  selected.push(index);
  render();
}

function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = 800;
  gain.gain.value = 0.1;

  osc.start();
  setTimeout(() => osc.stop(), 300);
}

function submitVote() {
  if (locked || selected.length === 0) return;

  locked = true;
  playBeep();
  render();

  setTimeout(() => {
    selected = [];
    locked = false;
    render();
  }, 1000);
}

function resetMachine() {
  selected = [];
  locked = false;
  render();
}

function render() {
  const container = document.getElementById("candidates");
  container.innerHTML = "";

  data.forEach((item, index) => {
    const isSelected = selected.includes(index);

    container.innerHTML += `
      <div class="row">
        <div class="no">${item.no}</div>
        <div class="name">${item.name || "-"}</div>
        <div class="symbol">
          ${item.symbol ? `<img src="${item.symbol}">` : ""}
        </div>
        <div class="light ${isSelected ? 'on' : ''}"></div>
        <button class="btn" onclick="toggle(${index})" ${locked ? 'disabled' : ''}></button>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
